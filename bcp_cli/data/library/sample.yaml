title: Sample Devotional Readings
readings:
  augustine:
    title: Augustine, Confessions, Book I.1
    text: |
      Source: Augustine of Hippo, Confessions, Book I, Chapter 1. Translated by J. G. Pilkington in Nicene and Post-Nicene Fathers, Series I, Volume I.
      https://en.wikisource.org/wiki/Nicene_and_Post-Nicene_Fathers:_Series_I/Volume_I/Confessions/Book_I/Chapter_1

      Great art Thou, O Lord, and greatly to be praised; great is Thy power, and of Thy wisdom there is no end. And man, being a part of Thy creation, desires to praise Thee, man, who bears about with him his mortality, the witness of his sin, even the witness that Thou "resistest the proud," yet man, this part of Thy creation, desires to praise Thee. Thou movest us to delight in praising Thee; for Thou hast formed us for Thyself, and our hearts are restless till they find rest in Thee.

      Lord, teach me to know and understand which of these should be first, to call on Thee, or to praise Thee; and likewise to know Thee, or to call upon Thee.

  bernard:
    title: Bernard, On Loving God, Chapter IX
    text: |
      Source: Bernard of Clairvaux, On Loving God, Chapter IX, "Of the second and third degrees of love."
      https://www.ccel.org/ccel/bernard/loving_god.xi.html

      So then in the beginning man loves God, not for God's sake, but for his own. It is something for him to know how little he can do by himself and how much by God's help, and in that knowledge to order himself rightly towards God, his sure support.

      But when tribulations, recurring again and again, constrain him to turn to God for unfailing help, would not even a heart as hard as iron, as cold as marble, be softened by the goodness of such a Savior, so that he would love God not altogether selfishly, but because He is God? Let frequent troubles drive us to frequent supplications; and surely, tasting, we must see how gracious the Lord is.

      Thereupon His goodness once realized draws us to love Him unselfishly, yet more than our own needs impel us to love Him selfishly.

  julian:
    title: Julian of Norwich, Revelations, Chapter V
    text: |
      Source: Julian of Norwich, Revelations of Divine Love, Chapter V. Edited by Grace Warrack.
      https://en.wikisource.org/wiki/Revelations_of_Divine_Love/Chapter_5

      I saw that He is to us everything that is good and comfortable for us: He is our clothing that for love wrappeth us, claspeth us, and all encloseth us for tender love, that He may never leave us; being to us all-thing that is good, as to mine understanding.

      Also in this He shewed me a little thing, the quantity of an hazel-nut, in the palm of my hand; and it was as round as a ball. I looked thereupon with eye of my understanding, and thought: What may this be? And it was answered generally thus: It is all that is made. I marvelled how it might last, for methought it might suddenly have fallen to naught for little[ness]. And I was answered in my understanding: It lasteth, and ever shall [last] for that God loveth it.

      And so All-thing hath the Being by the love of God.

  brother_lawrence:
    title: Brother Lawrence, First and Second Conversations
    text: |
      Source: Brother Lawrence, The Practice of the Presence of God, First and Second Conversations.
      https://en.wikisource.org/wiki/The_Practice_of_the_Presence_of_God/First_Conversation
      https://en.wikisource.org/wiki/The_Practice_of_the_Presence_of_God/Second_Conversation

      That we should establish ourselves in a sense of God's presence by continually conversing with Him. That it was a shameful thing to quit His conversation to think of trifles and fooleries.

      That we should feed and nourish our souls with high notions of God; which would yield us great joy in being devoted to Him.

      That he had always been governed by love, without selfish views; and that having resolved to make the love of God the end of all his actions, he had found reasons to be well satisfied with his method. That he was pleased when he could take up a straw from the ground for the love of God, seeking Him only, and nothing else, not even His gifts.
